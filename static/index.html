<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Negócios Locais</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      color: #222;
      min-height: 100vh;
    }

    header {
      background: #1a73e8;
      color: #fff;
      padding: 1.25rem 2rem;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .container {
      max-width: 960px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .search-card {
      background: #fff;
      border-radius: 12px;
      padding: 1.5rem 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .search-card label {
      font-weight: 500;
      white-space: nowrap;
    }

    .search-card input[type="number"] {
      width: 100px;
      padding: 0.5rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-card input[type="number"]:focus {
      border-color: #1a73e8;
    }

    .btn {
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.55rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn:hover { background: #1558b0; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    #status {
      margin-top: 1.25rem;
      font-size: 0.92rem;
      color: #555;
      min-height: 1.2em;
    }

    #status.error { color: #d32f2f; }
    #status.success { color: #2e7d32; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid #bbb;
      border-top-color: #1a73e8;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .results-header {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin: 2rem 0 0.75rem;
    }

    .results-header h2 { font-size: 1rem; font-weight: 600; }
    .badge {
      background: #e8f0fe;
      color: #1a73e8;
      border-radius: 20px;
      padding: 0.1rem 0.6rem;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .table-wrap {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.88rem;
    }

    thead th {
      background: #f0f4fb;
      text-align: left;
      padding: 0.75rem 1rem;
      font-weight: 600;
      color: #444;
      border-bottom: 1px solid #e0e0e0;
    }

    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8faff; }
    tbody td { padding: 0.7rem 1rem; vertical-align: middle; }

    .rating {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-weight: 600;
      color: #f9a825;
    }

    .rating small { color: #888; font-weight: 400; }

    a.site-link {
      color: #1a73e8;
      text-decoration: none;
      font-size: 0.82rem;
    }

    a.site-link:hover { text-decoration: underline; }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: #999;
      font-size: 0.95rem;
    }

    .filter-bar {
      background: #fff;
      border-radius: 12px;
      padding: 1rem 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .filter-bar input[type="text"],
    .filter-bar select {
      padding: 0.45rem 0.75rem;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    .filter-bar input[type="text"] { min-width: 200px; flex: 1; }
    .filter-bar select { min-width: 180px; }

    .filter-bar input[type="text"]:focus,
    .filter-bar select:focus { border-color: #1a73e8; }

    .btn-ghost {
      background: none;
      color: #888;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 0.45rem 1rem;
      font-size: 0.88rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-ghost:hover { color: #d32f2f; border-color: #d32f2f; }
  </style>
</head>
<body>

<header>Negócios Locais</header>

<div class="container">
  <div class="search-card">
    <label for="radius">Raio de busca:</label>
    <input type="number" id="radius" value="5" min="1" max="100" step="1" />
    <span style="color:#555">km</span>
    <button class="btn" id="btnSearch" onclick="startSearch()">Buscar Negócios</button>
  </div>

  <div id="status"></div>

  <div class="results-header" id="resultsHeader" style="display:none">
    <h2>Negócios encontrados</h2>
    <span class="badge" id="countBadge">0</span>
  </div>

  <div class="filter-bar" id="filterBar" style="display:none">
    <input type="text" id="filterName" placeholder="Filtrar por nome..." oninput="applyFilters()" />
    <select id="filterCategory" onchange="applyFilters()">
      <option value="">Todas as categorias</option>
    </select>
    <button class="btn-ghost" onclick="clearFilters()">Limpar filtros</button>
  </div>

  <div class="table-wrap" id="tableWrap" style="display:none">
    <table>
      <thead>
        <tr>
          <th>Nome</th>
          <th>Categoria</th>
          <th>Endereço</th>
          <th>Telefone</th>
          <th>Avaliação</th>
          <th>Site</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
  let allBusinesses = [];

  async function startSearch() {
    const btn = document.getElementById("btnSearch");
    const statusEl = document.getElementById("status");
    const radius = parseFloat(document.getElementById("radius").value);

    if (!radius || radius < 1 || radius > 100) {
      setStatus("Informe um raio entre 1 e 100 km.", "error");
      return;
    }

    btn.disabled = true;
    setStatus('<span class="spinner"></span>Obtendo localização...', "");

    let lat, lon;
    try {
      ({ lat, lon } = await getLocation());
    } catch (e) {
      setStatus("Erro ao obter localização: " + e.message, "error");
      btn.disabled = false;
      return;
    }

    setStatus('<span class="spinner"></span>Buscando negócios no Google Maps (pode levar alguns minutos)...', "");

    try {
      const res = await fetch("/scrape", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ lat, lon, radius_km: radius }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || "Erro desconhecido.");
      }

      const data = await res.json();
      setStatus(
        `Scraping concluído: ${data.scraped} negócios encontrados, ${data.new} novos adicionados.`,
        "success"
      );
      loadBusinesses(data.businesses);
    } catch (e) {
      setStatus("Erro ao buscar: " + e.message, "error");
    } finally {
      btn.disabled = false;
    }
  }

  function getLocation() {
    return new Promise((resolve, reject) => {
      if (!navigator.geolocation) {
        reject(new Error("Geolocalização não suportada neste navegador."));
        return;
      }
      navigator.geolocation.getCurrentPosition(
        (pos) => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude }),
        (err) => reject(new Error(err.message)),
        { timeout: 10000 }
      );
    });
  }

  function loadBusinesses(businesses) {
    allBusinesses = businesses;
    populateCategoryFilter(businesses);
    applyFilters();
  }

  function populateCategoryFilter(businesses) {
    const select = document.getElementById("filterCategory");
    const current = select.value;
    const categories = [...new Set(
      businesses.map((b) => b.category).filter(Boolean)
    )].sort();

    select.innerHTML = '<option value="">Todas as categorias</option>';
    categories.forEach((cat) => {
      const opt = document.createElement("option");
      opt.value = cat;
      opt.textContent = cat;
      if (cat === current) opt.selected = true;
      select.appendChild(opt);
    });
  }

  function applyFilters() {
    const nameQuery = document.getElementById("filterName").value.trim().toLowerCase();
    const categoryQuery = document.getElementById("filterCategory").value;

    const filtered = allBusinesses.filter((b) => {
      const matchName = !nameQuery || b.name.toLowerCase().includes(nameQuery);
      const matchCategory = !categoryQuery || b.category === categoryQuery;
      return matchName && matchCategory;
    });

    renderTable(filtered);
  }

  function clearFilters() {
    document.getElementById("filterName").value = "";
    document.getElementById("filterCategory").value = "";
    applyFilters();
  }

  function renderTable(businesses) {
    const tbody = document.getElementById("tableBody");
    const tableWrap = document.getElementById("tableWrap");
    const header = document.getElementById("resultsHeader");
    const filterBar = document.getElementById("filterBar");
    const badge = document.getElementById("countBadge");

    badge.textContent = businesses.length;
    header.style.display = "flex";
    filterBar.style.display = "flex";

    if (!businesses.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty">Nenhum negócio corresponde aos filtros.</div></td></tr>`;
      tableWrap.style.display = "block";
      return;
    }

    tbody.innerHTML = businesses.map((b) => `
      <tr>
        <td><strong>${esc(b.name)}</strong></td>
        <td>${esc(b.category || "—")}</td>
        <td>${esc(b.address || "—")}</td>
        <td>${esc(b.phone || "—")}</td>
        <td>${ratingHtml(b.rating, b.review_count)}</td>
        <td>${siteHtml(b.website)}</td>
      </tr>
    `).join("");

    tableWrap.style.display = "block";
  }

  function ratingHtml(rating, count) {
    if (!rating) return "—";
    const stars = "★".repeat(Math.round(rating)) + "☆".repeat(5 - Math.round(rating));
    return `<span class="rating">${rating.toFixed(1)} ${stars} <small>(${count ?? "?"})</small></span>`;
  }

  function siteHtml(url) {
    if (!url) return "—";
    const display = url.replace(/^https?:\/\//, "").replace(/\/$/, "");
    return `<a class="site-link" href="${esc(url)}" target="_blank" rel="noopener">${esc(display)}</a>`;
  }

  function setStatus(msg, type) {
    const el = document.getElementById("status");
    el.innerHTML = msg;
    el.className = type;
  }

  function esc(str) {
    return String(str ?? "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  // Load existing businesses on page load
  window.addEventListener("DOMContentLoaded", async () => {
    try {
      const res = await fetch("/businesses");
      const businesses = await res.json();
      if (businesses.length) loadBusinesses(businesses);
    } catch (_) {}
  });
</script>
</body>
</html>
